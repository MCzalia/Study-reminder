<!DOCTYPE html>
<html>
<head>
  <title>Add Assignment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <nav class="bg-blue-600 text-white p-4 flex justify-between">
    <h1 class="font-bold">Add Assignment</h1>
    <a href="dashbord.html" class="hover:text-yellow-800">Back</a>
  </nav>

  <div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <form action="tasks.html">

      <label class="block mb-2 font-medium">Assignment Title</label>
      <input type="text"
        class="w-full mb-4 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">

      <label class="block mb-2 font-medium">Description</label>
      <textarea
        class="w-full mb-4 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400"></textarea>

      <label class="block mb-2 font-medium">Due Date</label>
      <input type="date"
        class="w-full mb-6 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">

      <button type="submit"
        class="w-full bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition">
        Save Assignment
      </button>

    </form>

  </div>

</body>
</html>
