<!DOCTYPE html>
<html>
<head>
  <title>Task List</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <nav class="bg-blue-600 text-white p-4 flex justify-between">
    <h1 class="font-bold">Task List</h1>
    <a href="dashbord.html" class="hover:text-yellow-800">Back</a>
  </nav>

  <div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">

    <!-- Search -->
    <input type="text" placeholder="Search task..."
      class="w-full mb-6 p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">

    <!-- Sample Task 1 -->
    <div class="border-b pb-4 mb-4">
      <h2 class="font-semibold">Database Assignment</h2>
      <p class="text-gray-500 text-sm">Due: March 10, 2026</p>
      <span class="inline-block mt-2 bg-yellow-200 text-yellow-800 px-3 py-1 rounded-full text-xs">
        Pending
      </span>
    </div>

    <!-- Sample Task 2 -->
    <div class="border-b pb-4 mb-4">
      <h2 class="font-semibold line-through text-gray-400">
        Web Design Project
      </h2>
      <p class="text-gray-500 text-sm">Due: March 5, 2026</p>
      <span class="inline-block mt-2 bg-green-200 text-green-800 px-3 py-1 rounded-full text-xs">
        Completed
      </span>
    </div>

  </div>

</body>
</html>
